name: canary

# TEFAS API'sinin halen çalıştığını periyodik olarak kontrol eder.
# - Her pazartesi 16:00 UTC (Türkiye saati 19:00) çalışır
#   Bu saatte TEFAS günlük veriyi tamamlamış olur.
# - main'e push veya PR'da da çalışır
# - Manuel olarak da tetiklenebilir (Actions sekmesinden "Run workflow")
# Başarısız olursa GitHub email gönderir → maintainer haberdar olur.

on:
  schedule:
    - cron: '0 16 * * 1'  # her pazartesi 16:00 UTC (TR saati 19:00)
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:      # manuel tetikleme

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v
