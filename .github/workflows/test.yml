name: tests

# Her push ve PR'da unit testleri ve linter'ı çalıştırır.
# Multi-OS x multi-Python matrix ile uyumluluk doğrulanır.
# (Canary testleri ayrıca canary.yml'de haftalık çalışır.)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests (network-bagimsiz)
        run: pytest tests/test_client.py -v

      - name: Lint with ruff
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: ruff check . || true
